apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: court-reserve-workers
  namespace: bryzek-production
  labels:
    app: court-reserve-workers
    app.kubernetes.io/name: court-reserve-workers
spec:
  # Replicas MUST stay at 1. The persistent browser-profile PVC is RWO (DO block
  # storage), and the in-process browser context is a singleton; a second pod
  # would deadlock on the volume and corrupt session state.
  replicas: 1
  serviceName: court-reserve-workers
  selector:
    matchLabels:
      app: court-reserve-workers
  template:
    metadata:
      labels:
        app: court-reserve-workers
        app.kubernetes.io/name: court-reserve-workers
    spec:
      # Dedicated `tier: crawler` node pool so a Chromium scrape doesn't
      # compete with web traffic (tier: web) or backend jobs (tier: job).
      # Currently a single s-1vcpu-2gb node — bump pool size or size class
      # if the crawler queue grows.
      nodeSelector:
        tier: crawler
      # 90s gives an in-flight Chromium scrape time to finish + closeSession()
      # to flush profile state before SIGKILL. Tune up if scrapes get longer.
      terminationGracePeriodSeconds: 90
      containers:
        - name: court-reserve-workers
          image: registry.digitalocean.com/bryzek/court-reserve-workers:__IMAGE_TAG__
          # Image tags from `sem-info tag latest` are immutable semver, so
          # IfNotPresent is safe and avoids redundant registry pulls on restart.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8787
              protocol: TCP
          envFrom:
            - secretRef:
                name: court-reserve-workers-secrets
            - configMapRef:
                name: court-reserve-workers-config
                optional: true
          env:
            - name: PORT
              value: "8787"
          volumeMounts:
            - name: browser-profile
              mountPath: /app/browser-profile
          # Sized for actual Chromium-headless usage: ~250Mi idle, ~500-900Mi
          # during a scrape, ~1.5Gi peak on heavy admin grids. The original
          # 2Gi/4Gi was inherited from Fly's performance-2x and never measured.
          # Request fits in the existing job node pool without scale-out;
          # bursts borrow from acumen-job's unused headroom. Under contention
          # CRW (Burstable) is OOM-killed first — acceptable for a retryable
          # background scraper.
          resources:
            requests:
              cpu: 200m
              memory: 400Mi
            limits:
              # Caps below node allocatable (~1.4Gi on s-1vcpu-2gb) to avoid
              # kernel OOM-kill from a runaway Chromium tab.
              cpu: 900m
              memory: 1300Mi
          # Liveness is intentionally lenient: a Chromium scrape can saturate
          # the Node event loop for tens of seconds at a time. Failing here
          # restarts the pod mid-scrape. 60s * 5 = 5min before kill.
          livenessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: browser-profile
          persistentVolumeClaim:
            claimName: crw-browser-profile
